name: 01 - Hello
on: push

jobs:
  hello:
    runs-on: ubuntu-latest
    steps:
      - name: Exibir Mensagem Inicial
        run: echo "Hello World!"
      - name: Executar varios comandos
        run: |
         echo "Iniciando step"
         echo "Mostrando data atual: "
         date
         echo "Fim da execucao"
      - name: Baixando o código
        uses: actions/checkout@v6
      - name: Exibindo PATH
        run: pwd
    

      - name: Baixando Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
        
      - name: Verificando Python 
        run: python -v
      - name: Instalar Dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Rodando teste
        run: pytest --cov=sisrel --cov-report=html --cov-report=xml
      - name: Checando
        run: ls -la
      - name: Exportar HTML
        uses: actions/upload-artifact@v4
        with:
          path: htmlcov/
          name: coverage-html
      - name: Exportar XML
        uses: actions/upload-artifact@v4
        with:
          path: coverage.xml
          name: coverage.xml